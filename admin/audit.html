<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<title>Auditoria — Universo da Fé</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c;--gold-dim:#7a6128;
  --bg:#0d0f14;--surf:#161923;--surf2:#1e2330;--border:#252b3b;
  --text:#d8dde8;--muted:#6b7591;
  --ok:#1f6b3a;--ok-fg:#4ade80;
  --warn:#5a3e00;--warn-fg:#fbbf24;
  --err:#7a1e1e;--err-fg:#f87171;
  --blue-bg:#1a3a5c;--blue:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}

/* Login */
#login{display:flex;align-items:center;justify-content:center;min-height:100vh}
.lbox{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:44px 36px;width:320px;text-align:center}
.lbox .c{font-size:28px;margin-bottom:14px}
.lbox h1{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);margin-bottom:4px}
.lbox p{color:var(--muted);font-size:12px;margin-bottom:22px}
.lbox input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:13px;font-family:'IBM Plex Mono',monospace;margin-bottom:10px;outline:none;transition:border-color .2s}
.lbox input:focus{border-color:var(--gold)}
.lbtn{width:100%;padding:11px;background:var(--gold);color:#0d0f14;border:none;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer}
.lbtn:hover{opacity:.85}

/* App */
#app{display:none}
header{background:var(--surf);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:50px;position:sticky;top:0;z-index:100}
.hb{display:flex;align-items:center;gap:8px}
.hb .c{color:var(--gold);font-size:16px}
.hb h1{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold);font-weight:600}
.hs{display:flex;gap:14px;font-size:11px;font-family:'IBM Plex Mono',monospace}
.hs-item{display:flex;flex-direction:column;align-items:flex-end;gap:1px;cursor:pointer;padding:4px 8px;border-radius:5px;transition:background .15s}
.hs-item:hover{background:var(--surf2)}
.hs-item.active{background:var(--surf2);outline:1px solid var(--border)}
.sv{font-size:13px;font-weight:600}
.sl{font-size:9px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.hl{color:var(--muted);font-size:11px;text-decoration:none}
.hl:hover{color:var(--text)}

/* Controls */
.ctrl{padding:10px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:7px;flex-wrap:wrap;background:var(--surf)}
.btn{padding:7px 13px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.bg{background:var(--gold);color:#0d0f14}
.bd{background:var(--surf2);color:var(--text);border:1px solid var(--border)}
.bd:hover{border-color:var(--gold-dim)}
.sep{width:1px;height:20px;background:var(--border);margin:0 2px}

/* Tabs */
.tabs{display:flex;gap:2px;padding:0 20px;background:var(--surf);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 14px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;font-weight:500;border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:color .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;background:var(--surf2);border-radius:9px;padding:1px 6px;min-width:20px;text-align:center}
.tab.active .tab-badge{background:#2a1e00;color:var(--gold)}

/* Progress + Log */
.pw{height:3px;background:var(--surf2)}
.pb{height:100%;background:var(--gold);transition:width .4s;width:0%}
#lw{padding:7px 20px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);min-height:28px;max-height:72px;overflow-y:auto;background:var(--bg)}
.ll{line-height:1.6}
.ll.ok{color:var(--ok-fg)}
.ll.er{color:var(--err-fg)}

/* Main */
main{padding:18px 20px;max-width:1400px;margin:0 auto}
.sh{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;margin-top:20px}
.st{font-family:'Cormorant Garamond',serif;font-size:17px;color:var(--gold);font-weight:400}
.ss{color:var(--muted);font-size:11px}
.es{text-align:center;padding:60px 20px;color:var(--muted)}
.es h2{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--text);margin-bottom:10px;font-weight:400}
.es p{max-width:340px;margin:0 auto;line-height:1.7;font-size:12px}
.loading-inline{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px;padding:20px}
.sp{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Pagination */
.pagination{display:flex;align-items:center;gap:8px;margin-top:16px;justify-content:center}
.pg-btn{padding:6px 14px;background:var(--surf2);border:1px solid var(--border);border-radius:6px;color:var(--text);cursor:pointer;font-size:12px}
.pg-btn:hover{border-color:var(--gold-dim)}
.pg-btn:disabled{opacity:.3;cursor:not-allowed}
.pg-info{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:12px}

/* Card */
.card{background:var(--surf);border:1px solid var(--border);border-radius:11px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .2s,opacity .35s,transform .35s}
.card.card-saindo{opacity:0;transform:scale(.92)}
.card:hover{border-color:var(--gold-dim)}
.card.res{opacity:.55}
.ci{width:100%;height:180px;object-fit:contain;background:#070910;display:block;cursor:zoom-in}
.ci-ph{width:100%;height:180px;background:#070910;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px}
.cb{padding:11px;flex:1;display:flex;flex-direction:column;gap:8px}

/* Description */
.desc-banner{padding:8px 10px;background:var(--surf2);border-left:2px solid var(--gold);border-radius:0 6px 6px 0;font-size:12px;color:var(--text);line-height:1.5}
.desc-none{padding:7px 10px;font-size:11px;color:var(--muted);font-style:italic;border-left:2px solid var(--border);background:var(--surf2);border-radius:0 6px 6px 0;line-height:1.4}

/* Briefing grid */
.bfg{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.bfi{padding:6px 8px;background:var(--bg);border-radius:5px;border:1px solid var(--border)}
.bfi-l{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.bfi-v{font-size:11.5px;color:var(--text);font-weight:500}
.bfi-v.null{color:var(--muted);font-style:italic;font-weight:400;font-size:11px}
.bfi.price{border-color:var(--gold-dim);background:#1a1500}
.bfi.price .bfi-v{color:var(--gold);font-size:12px;font-weight:700}
.bfi.price-etiqueta{border-color:#2e5c3a;background:#0d1a12}
.bfi.price-etiqueta .bfi-v{color:var(--ok-fg)}
.bfi-input{width:100%;background:transparent;border:none;color:var(--text);font-size:11.5px;font-weight:500;font-family:'Inter',sans-serif;outline:none;padding:2px 4px;border:1px solid var(--border);border-radius:4px;transition:border-color .15s,background .15s;cursor:text}
.bfi-input:hover{border-color:var(--gold-dim);background:var(--surf2)}
.bfi-input:focus{border-color:var(--gold);background:var(--surf2)}
.bfi-l::after{content:' ✎';opacity:.4;font-size:9px}
.bfi.price .bfi-input{color:var(--gold);font-weight:700;font-size:12px}
.bfi.price-etiqueta .bfi-input{color:var(--ok-fg)}
.bfi-input::placeholder{color:var(--muted);font-style:italic}
.bfi.full{grid-column:1/-1}

/* Qualidade foto */
.qfoto{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:9px}
.qfoto.BOA{background:#14261a;color:var(--ok-fg)}
.qfoto.REGULAR{background:var(--warn);color:var(--warn-fg)}
.qfoto.RUIM{background:var(--err);color:var(--err-fg)}

/* Shopify suggestion */
.shopify-sug{padding:8px 10px;background:#0d1a12;border:1px solid #2e5c3a;border-radius:6px}
.shopify-sug-l{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#4ade8066;margin-bottom:3px}
.shopify-sug-title{color:var(--ok-fg);font-weight:600;margin-bottom:3px;font-size:11.5px}
.shopify-sug-desc{color:#9fd3b0;font-size:11px;line-height:1.5}

/* Card meta */
.cm{display:flex;align-items:center;justify-content:space-between;gap:5px}
.fn{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px}
.badge{font-size:9px;font-weight:700;letter-spacing:.04em;padding:2px 7px;border-radius:9px;white-space:nowrap}
.st-PRONTO_PARA_REVISAO{background:var(--ok);color:var(--ok-fg)}
.st-APROVADO{background:#14432a;color:#4ade80}
.st-REPROVADO{background:#2a1414;color:#f87171}
.st-PRECISA_DE_NOVA_FOTO{background:var(--warn);color:var(--warn-fg)}
.st-PRECISA_DE_AJUSTE{background:#2a2000;color:var(--warn-fg)}
.st-ERRO{background:var(--err);color:var(--err-fg)}
.st-PENDENTE,.st-ANALISANDO{background:var(--surf2);color:var(--muted)}

/* Alertas */
.alertas-box{padding:7px 10px;background:#1a1400;border:1px solid var(--warn);border-radius:6px}
.alertas-lbl{font-size:9px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--warn-fg);margin-bottom:3px}
.alerta-item{font-size:11px;color:#e0b84a;line-height:1.5;padding:1px 0 1px 6px;border-top:1px solid #2a2000}
.alerta-item:first-of-type{border-top:none;padding-top:0}

/* Candidates */
.cl{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.clist{display:flex;flex-direction:column;gap:3px}
.cbtn{width:100%;text-align:left;padding:7px 9px;background:var(--surf2);border:1px solid var(--border);border-radius:5px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:7px;font-size:11px;transition:border-color .15s}
.cbtn:hover{border-color:var(--gold-dim)}
.cbtn.sel{border-color:var(--blue);background:var(--blue-bg)}
.cscore{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap}
.cnone{font-size:11px;color:var(--muted);font-style:italic;padding:3px 0}
.linked{padding:8px 10px;background:#14261a;border:1px solid #2e5c3a;border-radius:6px;font-size:11.5px;color:var(--ok-fg)}
.linked-l{font-size:9px;font-weight:600;color:#4ade8055;letter-spacing:.07em;text-transform:uppercase;margin-bottom:2px}

/* Edit panel */
.ep{background:var(--bg);border:1px solid var(--blue);border-radius:8px;padding:11px;display:flex;flex-direction:column;gap:7px}
.ep-sec{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--blue)}
.ep-fields{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.ep-field{display:flex;flex-direction:column;gap:3px}
.ep-lbl{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.ep-save{padding:7px 12px;background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue);border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;align-self:flex-start}
.ep-save:hover{opacity:.8}
.ep-div{height:1px;background:var(--border);margin:2px 0}
.es-inp{width:100%;padding:7px 9px;background:var(--surf2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;outline:none;transition:border-color .2s}
.es-inp:focus{border-color:var(--gold)}
.er-list{display:flex;flex-direction:column;gap:3px;max-height:140px;overflow-y:auto}
.er-btn{width:100%;text-align:left;padding:6px 9px;background:var(--surf2);border:1px solid var(--border);border-radius:5px;color:var(--text);cursor:pointer;font-size:11px;transition:border-color .15s}
.er-btn:hover{border-color:var(--gold-dim)}
.er-btn.sel{border-color:var(--blue);background:var(--blue-bg)}
.er-hint{color:var(--muted);font-size:11px;font-style:italic;padding:5px 0}

/* Error msg */
.err-msg{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--err-fg);padding:7px;background:var(--err);border-radius:5px;word-break:break-all}

/* Actions */
.acts{display:flex;gap:5px;flex-wrap:wrap}
.aa{padding:7px 12px;background:var(--ok);color:var(--ok-fg);border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;flex:1;transition:opacity .15s}
.aa:disabled{opacity:.3;cursor:not-allowed}
.aa:not(:disabled):hover{opacity:.85}
.ask{padding:7px 9px;background:var(--surf2);color:var(--muted);border:1px solid var(--border);border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
.ask:hover{color:var(--text)}
.arj{padding:7px 9px;background:var(--err);color:var(--err-fg);border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
.arj:hover{opacity:.85}
.anf{padding:7px 9px;background:var(--warn);color:var(--warn-fg);border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
.ae{padding:7px 9px;background:var(--surf2);color:var(--text);border:1px solid var(--blue);border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
.ae:hover{background:var(--blue-bg)}
.res-l{text-align:center;padding:4px;font-size:11px;font-weight:600;color:var(--muted)}
.btn-editar-tudo{width:100%;margin-top:8px;padding:9px;background:var(--surf2);color:var(--gold);border:1px solid var(--gold-dim);border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:background .15s}
.btn-editar-tudo:hover{background:#2a2000}

/* Paste box (contenteditable target) */
.paste-box{margin-top:8px;padding:10px;border:1px solid var(--blue);border-radius:8px;background:var(--bg)}
.paste-box-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
.paste-target{min-height:50px;border:2px dashed var(--blue);border-radius:6px;background:var(--blue-bg);padding:12px;cursor:text;color:var(--text);font-size:12px;outline:none;display:flex;align-items:center;justify-content:center;text-align:center;transition:background .15s}
.paste-target:empty:before{content:attr(data-placeholder);color:var(--blue);font-weight:600}
.paste-target:focus{background:#234a6e;border-color:#5b9bf6}
.paste-target.uploading{border-color:var(--gold);background:#1a1500}
.paste-target img{max-width:100%;border-radius:4px}
.paste-zone.done{margin-top:8px;padding:12px;border:2px solid #2e5c3a;border-radius:8px;background:#14261a;color:var(--ok-fg);font-size:12px;font-weight:600;text-align:center;cursor:pointer}
.paste-saved{margin-top:8px;padding:9px 11px;border:1px solid #2e5c3a;border-radius:8px;background:#14261a;display:flex;align-items:center;gap:8px}
.shop-link{display:block;text-align:center;margin-top:6px;padding:8px;background:#0d1a12;border:1px solid #2e5c3a;border-radius:7px;color:var(--ok-fg);font-size:12px;font-weight:600;text-decoration:none}
.shop-link:hover{background:#14261a}
.enviado-badge{text-align:center;font-size:10px;font-weight:700;letter-spacing:.05em;color:var(--ok-fg);margin-top:4px}
.paste-saved-ok{color:var(--ok-fg);font-size:12px;font-weight:600;flex:1}
.paste-troca{padding:5px 10px;background:var(--surf2);color:var(--text);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:border-color .15s}
.paste-troca:hover{border-color:var(--gold-dim)}
.gpt-row{display:flex;gap:5px;margin-bottom:7px}
.gpt-btn{flex:1;padding:7px 8px;background:var(--surf2);color:var(--text);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:border-color .15s}
.gpt-btn:hover{border-color:var(--gold)}
.gpt-btn-ai{border-color:#8b5cf6;color:#a78bfa;font-weight:700}
.gpt-btn-ai:hover{border-color:#a78bfa;background:#1a1030}
.gpt-btn-ai:disabled{opacity:.5;cursor:wait}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--surf);border:1px solid var(--border);color:var(--text);padding:14px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:9999;transition:transform .3s ease;box-shadow:0 8px 30px rgba(0,0,0,.5);max-width:80vw;text-align:center}
#toast.toast-show{transform:translateX(-50%) translateY(0)}
#toast.toast-ok{border-color:#2e5c3a;color:var(--ok-fg);background:#0d1f13}
#toast.toast-er{border-color:var(--err);color:var(--err-fg);background:#1f0d0d}

/* Abas de foto no card */
.foto-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:#0a0c12}
.ftab{flex:1;padding:7px 6px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:11px;font-weight:600;border-bottom:2px solid transparent;transition:color .15s;font-family:'Inter',sans-serif}
.ftab:hover{color:var(--text)}
.ftab.active{color:var(--gold);border-bottom-color:var(--gold)}
.ftab-cmp{flex:0 0 auto;padding:7px 12px;color:var(--blue)}
.ftab-cmp:hover{color:#5b9bf6}

/* Modal de comparação */
#cmp-modal{position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center}
.cmp-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.85);cursor:pointer}
.cmp-content{position:relative;background:var(--surf);border:1px solid var(--border);border-radius:14px;width:min(1200px,94vw);max-height:92vh;display:flex;flex-direction:column;overflow:hidden}
.cmp-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold)}
.cmp-close{padding:6px 14px;background:var(--surf2);color:var(--text);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
.cmp-close:hover{border-color:var(--err-fg);color:var(--err-fg)}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);flex:1;overflow:auto}
.cmp-side{background:var(--bg);padding:16px;display:flex;flex-direction:column;align-items:center;gap:10px}
.cmp-label{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.cmp-label-nova{color:var(--ok-fg)}
.cmp-side img{max-width:100%;max-height:70vh;object-fit:contain;border-radius:8px}
@media(max-width:700px){.cmp-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="login">
  <div class="lbox">
    <div class="c">✝</div>
    <h1>Universo da Fé</h1>
    <p>Sistema de Auditoria de Fotos</p>
    <input id="pwd" type="password" placeholder="Senha admin" autocomplete="current-password"/>
    <button class="lbtn" onclick="login()">Entrar</button>
  </div>
</div>

<div id="app">
  <header>
    <div class="hb"><span class="c">✝</span><h1>Auditoria de Fotos</h1></div>
    <div class="hs" id="hs"></div>
    <a href="/admin/aprovados" class="hl">✓ Aprovados</a>
    <a href="/admin/" class="hl">← Painel</a>
  </header>

  <div class="ctrl">
    <button class="btn bg" onclick="processarProximos10()" id="btnP">▶ Processar próximos 15</button>
    <button class="btn bd" onclick="gerarFotosLote()" id="btnGenLote" style="border-color:#8b5cf6;color:#a78bfa">✨ Gerar fotos do lote</button>
    <div class="sep"></div>
    <button class="btn bd" onclick="syncDrive()">🔄 Drive</button>

    <button class="tab" onclick="setTab('fila')" id="tab-fila">Fila <span class="tab-badge" id="tb-fila">—</span></button>

    <button class="tab" onclick="setTab('REPROVADO')" id="tab-REPROVADO">✗ Reprovados <span class="tab-badge" id="tb-REPROVADO">0</span></button>
    <button class="tab" onclick="setTab('PRECISA_DE_NOVA_FOTO')" id="tab-PRECISA_DE_NOVA_FOTO">📷 Nova Foto <span class="tab-badge" id="tb-PRECISA_DE_NOVA_FOTO">0</span></button>

  <div id="lw"></div>

  <main>
    <div id="mc">
      <div class="es"><h2>Carregando…</h2></div>
    </div>
  </main>
</div>

<script>
let PWD='', batchId=null, busy=false, activeTab='revisao';
const SELS={}, ESELS={}, EOPEN={}, PENDING_FIELDS={}, PZ_RESET={};
let tabOffset={};

// ── Auth ──────────────────────────────────────────────────────────────────────
function login(){
  PWD=document.getElementById('pwd').value.trim();
  if(!PWD)return;
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  atualizarContagens();
  carregarLote();
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('login').style.display!=='none')login();
});

// ── API ───────────────────────────────────────────────────────────────────────
async function api(path,opts={}){
  const r=await fetch('/api/audit/'+path,{
    ...opts,
    headers:{'Content-Type':'application/json','X-Admin-Password':PWD,...(opts.headers||{})}
  });
  if(r.status===401){alert('Senha incorreta');location.reload();throw new Error('unauth');}
  return r.json();
}

// ── Log ───────────────────────────────────────────────────────────────────────
function log(msg,t=''){
  const w=document.getElementById('lw');
  const d=document.createElement('div');
  d.className='ll'+(t?' '+t:'');
  d.textContent=`[${new Date().toTimeString().slice(0,8)}] ${msg}`;
  w.prepend(d);
  while(w.children.length>30)w.removeChild(w.lastChild);
  // Toast grande e visível para feedbacks importantes
  if(t==='ok'||t==='er')toast(msg,t);
}

let toastTimer=null;
function toast(msg,type){
  let el=document.getElementById('toast');
  if(!el){
    el=document.createElement('div');
    el.id='toast';
    document.body.appendChild(el);
  }
  el.textContent=(type==='ok'?'✓ ':'⚠ ')+msg;
  el.className='toast-show toast-'+type;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{el.className='';},3500);
}

// ── Global counts ─────────────────────────────────────────────────────────────
let counts={};
async function atualizarContagens(){
  try{
    const r=await api('records');
    counts=r.counts||{};
    const fila=(counts.PENDENTE||0)+(counts.ANALISANDO||0);
    const rev=(counts.PRONTO_PARA_REVISAO||0);
    document.getElementById('tb-fila').textContent=fila;
    document.getElementById('tb-revisao').textContent=rev;
    document.getElementById('tb-APROVADO').textContent=counts.APROVADO||0;
    document.getElementById('tb-REPROVADO').textContent=counts.REPROVADO||0;
    document.getElementById('tb-PRECISA_DE_NOVA_FOTO').textContent=counts.PRECISA_DE_NOVA_FOTO||0;
    document.getElementById('tb-ERRO').textContent=counts.ERRO||0;
    // Header stats
    document.getElementById('hs').innerHTML=`
      <div class="hs-item" onclick="setTab('fila')"><span class="sv">${r.total}</span><span class="sl">Total</span></div>
      <div class="hs-item" onclick="setTab('revisao')"><span class="sv" style="color:var(--ok-fg)">${rev}</span><span class="sl">Revisão</span></div>
      <div class="hs-item" onclick="setTab('APROVADO')"><span class="sv" style="color:#4ade80">${counts.APROVADO||0}</span><span class="sl">Aprovados</span></div>
      <div class="hs-item" onclick="setTab('REPROVADO')"><span class="sv" style="color:var(--err-fg)">${counts.REPROVADO||0}</span><span class="sl">Reprovados</span></div>
      <div class="hs-item" onclick="setTab('ERRO')"><span class="sv" style="color:var(--warn-fg)">${counts.ERRO||0}</span><span class="sl">Erros</span></div>
    `;
  }catch(err){log('Erro ao carregar contagens: '+err.message,'er');}
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function setTab(t){
  activeTab=t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  const btn=document.getElementById('tab-'+t);
  if(btn)btn.classList.add('active');
  tabOffset[t]=tabOffset[t]||0;
  renderTab();
}

async function renderTab(){
  const mc=document.getElementById('mc');
  if(activeTab==='revisao'){
    await renderRevisao(mc);
  } else if(activeTab==='fila'){
    await renderFila(mc);
  } else {
    await renderStatus(activeTab, mc);
  }
}

// ── Em Revisão (lote atual) ───────────────────────────────────────────────────
async function renderRevisao(mc){
  mc.innerHTML='<div class="loading-inline"><div class="sp"></div> Carregando…</div>';
  // Mostra TODOS os itens prontos para revisão (todos os lotes), paginado de 15
  const limit=15, offset=tabOffset.revisao||0;
  const r=await api(`records?status=PRONTO_PARA_REVISAO&limit=${limit}&offset=${offset}`);
  if(r.error){mc.innerHTML='<div class="es"><h2>Erro</h2><p>'+r.error+'</p></div>';return;}
  if(!r.items||!r.items.length){
    mc.innerHTML='<div class="es"><h2>Nada para revisar agora</h2><p>Clique em <strong>▶ Processar próximos 15</strong> para analisar mais fotos da fila.</p></div>';
    return;
  }
  const h=`<div class="sh"><span class="st">Aguardando revisão</span><span class="ss">${r.total} foto(s)</span>
    <button class="btn bd" id="btnGenLote" style="border-color:#8b5cf6;color:#a78bfa;margin-left:10px" onclick="gerarFotosLoteRevisao()">✨ Gerar fotos destas 15</button></div>
    <div class="grid">${r.items.map(i=>card(i,false)).join('')}</div>
    ${pagination(r.total,limit,offset,'revisao')}`;
  mc.innerHTML=h;
}

// Gera fotos para os itens visíveis na aba Em Revisão (independe de lote)
async function gerarFotosLoteRevisao(){
  if(genBatchRunning)return;
  const limit=15, offset=tabOffset.revisao||0;
  const r=await api(`records?status=PRONTO_PARA_REVISAO&limit=${limit}&offset=${offset}`);
  if(r.error||!r.items){log('Erro ao buscar itens','er');return;}
  const alvos=r.items.filter(i=>!i.imagem_enviada);
  if(!alvos.length){log('Todos estes já têm foto nova','er');return;}
  if(!confirm(`Gerar fotos com IA para ${alvos.length} item(ns)? (~R$0,10 cada)`))return;
  genBatchRunning=true;
  const btn=document.getElementById('btnGenLote');
  if(btn)btn.disabled=true;
  let ok=0,fail=0;
  for(const it of alvos){
    if(btn)btn.textContent=`⏳ ${ok+fail+1}/${alvos.length}…`;
    try{
      const rr=await api('generate-image',{method:'POST',body:JSON.stringify({item_id:it.id})});
      if(rr.error){fail++;log(`Item ${it.id}: ${rr.error}`,'er');await refreshCard(it.id);continue;}
      if(rr.needs_compression&&rr.image_base64){
        const comp=await comprimirDataUrl(rr.image_base64);
        const r2=await api('upload-image',{method:'POST',body:JSON.stringify({item_id:it.id,image_base64:comp})});
        if(r2.error){fail++;log(`Item ${it.id}: ${r2.error}`,'er');await refreshCard(it.id);continue;}
      }
      ok++;log(`Item ${it.id}: foto gerada ✓`);
      await refreshCard(it.id);
    }catch(err){fail++;log(`Item ${it.id}: ${err.message}`,'er');}
  }
  log(`Fotos: ${ok} geradas, ${fail} falha(s)`,fail?'er':'ok');
  genBatchRunning=false;
  if(btn){btn.disabled=false;btn.textContent='✨ Gerar fotos destas 15';}
}

// ── Fila (todos PENDENTE) ─────────────────────────────────────────────────────
async function renderFila(mc){
  mc.innerHTML='<div class="loading-inline"><div class="sp"></div> Carregando…</div>';
  const limit=24, offset=tabOffset.fila||0;
  const r=await api(`records?status=PENDENTE&limit=${limit}&offset=${offset}`);
  if(r.error){mc.innerHTML='<div class="es"><h2>Erro</h2><p>'+r.error+'</p></div>';return;}
  if(!r.items.length){mc.innerHTML='<div class="es"><h2>Fila vazia</h2><p>Todos os registros foram processados.</p></div>';return;}
  mc.innerHTML=`<div class="sh"><span class="st">Fila de processamento</span><span class="ss">${r.total} pendentes</span></div>
    <div class="grid">${r.items.map(i=>cardSimples(i)).join('')}</div>
    ${pagination(r.total,limit,offset,'fila')}`;
}

// ── Por status ────────────────────────────────────────────────────────────────
const STATUS_LABELS={
  APROVADO:'Aprovados',REPROVADO:'Reprovados',
  PRECISA_DE_NOVA_FOTO:'Precisam de Nova Foto',ERRO:'Erros',
};
async function renderStatus(status, mc){
  mc.innerHTML='<div class="loading-inline"><div class="sp"></div> Carregando…</div>';
  const limit=24, offset=tabOffset[status]||0;
  const r=await api(`records?status=${status}&limit=${limit}&offset=${offset}`);
  if(r.error){mc.innerHTML='<div class="es"><h2>Erro</h2><p>'+r.error+'</p></div>';return;}
  if(!r.items.length){
    mc.innerHTML=`<div class="es"><h2>${STATUS_LABELS[status]||status}</h2><p>Nenhum item ainda.</p></div>`;return;
  }
  const isRes=['APROVADO','REPROVADO','PRECISA_DE_NOVA_FOTO','PRECISA_DE_AJUSTE'].includes(status);
  const errBtn=status==='ERRO'?`<button class="btn bd" style="border-color:#f87171;color:#f87171;margin-left:10px" onclick="reprocessarErros()">↩ Reprocessar todos os erros</button>`:'';
  mc.innerHTML=`<div class="sh"><span class="st">${STATUS_LABELS[status]||status}</span><span class="ss">${r.total} foto(s)</span>${errBtn}</div>
    <div class="grid">${r.items.map(i=>card(i,isRes)).join('')}</div>
    ${pagination(r.total,limit,offset,status)}`;
}

function pagination(total, limit, offset, key){
  if(total<=limit)return '';
  const page=Math.floor(offset/limit)+1;
  const pages=Math.ceil(total/limit);
  return `<div class="pagination">
    <button class="pg-btn" ${offset===0?'disabled':''} onclick="goPage('${key}',${offset-limit})">← Anterior</button>
    <span class="pg-info">Pág. ${page} de ${pages}</span>
    <button class="pg-btn" ${offset+limit>=total?'disabled':''} onclick="goPage('${key}',${offset+limit})">Próxima →</button>
  </div>`;
}
function goPage(key,offset){
  tabOffset[key]=Math.max(0,offset);
  renderTab();
}

// ── Card simples (só fila — sem ações) ───────────────────────────────────────
function cardSimples(it){
  const thumbUrl=it.drive_file_id?`/api/audit/thumb?id=${it.drive_file_id}&s=512&pwd=${encodeURIComponent(PWD)}`:'';
  const img=thumbUrl?`<img class="ci" src="${e(thumbUrl)}" onerror="this.parentElement.querySelector('.ci-ph-fallback')?.style.setProperty('display','flex');this.style.display='none'" loading="lazy"/><div class="ci-ph ci-ph-fallback" style="display:none">HEIC sem preview</div>`
    :`<div class="ci-ph">sem imagem</div>`;
  return `<div class="card">
    ${img}
    <div class="cb">
      <div class="cm"><span class="fn" title="${e(it.file_name)}">${e(it.file_name)}</span>
        <span class="badge st-PENDENTE">PENDENTE</span></div>
    </div>
  </div>`;
}

// ── Card completo ─────────────────────────────────────────────────────────────
// ── Salvar campo individual inline (sem re-render, mantém foco) ────────────────
async function salvarCampo(id, field, value, type){
  let val = (value==null?'':String(value)).trim();
  if(val===''){
    val = null;
  } else if(type==='number'){
    const n = Number(val);
    if(Number.isNaN(n)){ log(`"${value}" não é um número válido`,'er'); return; }
    val = n;
  }
  try{
    const r=await api('review-action',{method:'POST',body:JSON.stringify({
      item_id:id, action:'CORRIGIR', fields:{[field]:val}
    })});
    if(r.error){log(`Erro ao salvar ${field}: ${r.error}`,'er');return;}
    log(`✓ Salvo: ${field} = ${val==null?'(vazio)':val}`,'ok');
  }catch(err){log('Erro: '+err.message,'er');}
}

// ── Colar imagem (Ctrl+V) → Shopify ───────────────────────────────────────────
function pasteZone(it, hasProduct){
  const pid = it.shopify_product_id || (SELS[it.id]?.product_id) || '';

    <div class="paste-target" id="pz-${it.id}" contenteditable="true"

// Upload por seleção de arquivo — alternativa garantida ao Ctrl+V
async function enviarArquivo(ev, id, productId){
  const file=ev.target.files?.[0];
  if(!file)return;
  const pz=document.getElementById('pz-'+id);
  if(pz){pz.classList.add('uploading');pz.textContent='Comprimindo e salvando…';}
  try{
    const b64=await compressImage(file);
    const r=await api('upload-image',{method:'POST',body:JSON.stringify({
      item_id:id, product_id:productId||null, image_base64:b64, filename:`produto-${id}.jpg`,
    })});
    if(r.error){log('Erro: '+r.error,'er');if(pz){pz.classList.remove('uploading');pz.textContent='Erro — tente de novo';}return;}
    log('Foto salva ✓ — use as abas Original/Nova para comparar','ok');
    PZ_RESET[id]=false;
    await refreshCard(id);
  }catch(err){
    log('Erro: '+err.message,'er');
    if(pz){pz.classList.remove('uploading');pz.textContent='Erro — tente de novo';}
  }
}

// ── Geração automática de foto com IA ─────────────────────────────────────────
async function gerarFotoIA(id){
  const btn=document.getElementById('genbtn-'+id);
  if(btn){btn.disabled=true;btn.textContent='⏳ Gerando…';}
  log(`Gerando foto do item ${id} com IA…`);
  try{
    const r=await api('generate-image',{method:'POST',body:JSON.stringify({item_id:id})});
    if(r.error){
      log('Erro: '+r.error,'er');
      if(btn){btn.disabled=false;btn.textContent='✨ Gerar foto IA';}
      return;
    }
    // Se a imagem veio grande, comprime no navegador e reenvia
    if(r.needs_compression&&r.image_base64){
      if(btn)btn.textContent='⏳ Comprimindo…';
      const comprimida=await comprimirDataUrl(r.image_base64);
      const r2=await api('upload-image',{method:'POST',body:JSON.stringify({item_id:id,image_base64:comprimida})});
      if(r2.error){log('Erro ao salvar: '+r2.error,'er');if(btn){btn.disabled=false;btn.textContent='✨ Gerar foto IA';}return;}
    }
    log(`Foto gerada (${r.provider}) — compare nas abas Original/Nova`,'ok');
    await refreshCard(id);
  }catch(err){
    log('Erro: '+err.message,'er');
    if(btn){btn.disabled=false;btn.textContent='✨ Gerar foto IA';}
  }
}

// Comprime uma data URL (imagem base64) via canvas — reduz para caber no D1
function comprimirDataUrl(dataUrl){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=1024;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#ffffff';ctx.fillRect(0,0,w,h);
      ctx.drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',0.82));
    };
    img.onerror=reject;
    img.src=dataUrl;
  });
}

// Gera fotos de todos os itens do lote sem foto nova
let genBatchRunning=false;
async function gerarFotosLote(){
  if(genBatchRunning)return;
  if(!batchId){log('Nenhum lote ativo — processe primeiro','er');return;}
  const r=await api('batch-status?batch_id='+batchId);
  if(r.error)return;
  const alvos=r.items.filter(i=>i.status==='PRONTO_PARA_REVISAO'&&!i.imagem_enviada);
  if(!alvos.length){log('Nenhum item sem foto nova neste lote','er');return;}
  if(!confirm(`Gerar fotos com IA para ${alvos.length} item(ns)? (~R$1 cada em alta qualidade)`))return;
  genBatchRunning=true;
  const btn=document.getElementById('btnGenLote');
  if(btn)btn.disabled=true;
  let ok=0,fail=0;
  for(const it of alvos){
    if(btn)btn.textContent=`⏳ ${ok+fail+1}/${alvos.length}…`;
    try{
      const rr=await api('generate-image',{method:'POST',body:JSON.stringify({item_id:it.id})});
      if(rr.error){fail++;log(`Item ${it.id}: ${rr.error}`,'er');await refreshCard(it.id);continue;}
      // Imagem veio grande — comprime no navegador e salva (igual ao individual)
      if(rr.needs_compression&&rr.image_base64){
        const comprimida=await comprimirDataUrl(rr.image_base64);
        const r2=await api('upload-image',{method:'POST',body:JSON.stringify({item_id:it.id,image_base64:comprimida})});
        if(r2.error){fail++;log(`Item ${it.id}: erro ao salvar — ${r2.error}`,'er');await refreshCard(it.id);continue;}
      }
      ok++;log(`Item ${it.id}: foto gerada ✓`);
      await refreshCard(it.id);
    }catch(err){fail++;log(`Item ${it.id}: ${err.message}`,'er');}
  }
  log(`Fotos do lote: ${ok} geradas, ${fail} falha(s)`,fail?'er':'ok');
  genBatchRunning=false;
  if(btn){btn.disabled=false;btn.textContent='✨ Gerar fotos do lote';}
}

// Prompt de edição de foto, personalizado com os dados do produto
function copiarPromptGPT(id){
  // Busca dados do card na tela
  const cardEl=document.getElementById('card-'+id);
  const desc=cardEl?.querySelector('.desc-banner')?.textContent?.trim()||'';
  const prompt=`Edit the attached photo. This is a real product photograph${desc?` of: ${desc}`:''} of a Catholic devotional item. Turn it into a clean professional e-commerce image. Follow every rule with zero deviation.

ABSOLUTE RULE — THE PRODUCT MUST STAY 100% IDENTICAL:
Keep the item exactly as in the original — same saint or figure, same face, pose, colors, paint, material, texture, proportions and shape. Do NOT repaint, redesign, beautify or improve it. Do NOT swap the saint. Do NOT change gold to silver or any color. The product is untouchable.

REMOVE THESE (important):
1. PLASTIC PACKAGING: if the product is inside a plastic bag, shrink wrap or blister, remove the packaging completely and show the bare clean product, unwrapped. No plastic wrinkles or reflections.
2. PRICE TAGS/STICKERS: remove any price tag, sticker, label, barcode or handwritten price near the product. No price visible.
3. CLUTTER: remove any other object, hand or box. Show ONLY this single product.

BACKGROUND AND LIGHT:
Clean unwrapped product on light warm-white marble/travertine, soft eucalyptus or olive branches blurred behind. Cream, beige, ivory tones. Natural soft side daylight, gentle shadows, clean negative space.

REALISM (not AI):
Real photograph, professional camera, 50mm lens. Natural grain, true textures, realistic soft shadows and reflections. Keep real imperfections. No digital-art look, no plastic smoothness, no glow, no CGI. Shallow depth of field, product sharp.

FORMAT: square 1:1, high resolution, editorial product photography, calm reverent mood for a Catholic goods store. Output one photorealistic image of the clean product.`;
  navigator.clipboard.writeText(prompt).then(()=>{
    log('Prompt copiado! Agora: 2. Abrir foto original → anexa no ChatGPT → cola o prompt → gera','ok');
    // Feedback visual no próprio botão
    const btns=document.querySelectorAll(`#card-${id} .gpt-btn`);
    if(btns[0]){
      const orig=btns[0].textContent;
      btns[0].textContent='✓ Copiado!';

async function handlePaste(ev, id, productId){
  ev.preventDefault();
  const cd=ev.clipboardData||ev.originalEvent?.clipboardData||window.clipboardData;
  const items=cd?.items;
  if(!items){log('Não consegui ler a área de transferência','er');return;}
  let imgFile=null;
  for(const it of items){
    if(it.type&&it.type.startsWith('image/')){imgFile=it.getAsFile();break;}
  }
  const pz=document.getElementById('pz-'+id);
  if(!imgFile){
    if(pz)pz.textContent='';
    log('Não havia imagem colada. No ChatGPT: botão direito na imagem → Copiar imagem, depois cole aqui.','er');
    return;
  }

  if(pz){pz.classList.add('uploading');pz.textContent='Comprimindo e salvando…';}

  try{
    const b64=await compressImage(imgFile); // comprime: 4MB → ~200KB, nunca dá TOOBIG
    const r=await api('upload-image',{method:'POST',body:JSON.stringify({
      item_id:id, product_id:productId||null, image_base64:b64, filename:`produto-${id}.jpg`,
    })});
    if(r.error){
      log('Erro: '+r.error,'er');
      if(pz){pz.classList.remove('uploading');pz.textContent='Erro — cole de novo';}
      return;
    }
    log(`Foto salva${r.shopify?' e enviada ao Shopify':''} ✓ — use as abas Original/Nova para comparar`,'ok');
    PZ_RESET[id]=false;
    // Re-renderiza o card para mostrar as abas Original / Nova / Comparar
    await refreshCard(id);
  }catch(err){
    log('Erro: '+err.message,'er');
    if(pz){pz.classList.remove('uploading');pz.textContent='Erro — cole de novo';}
  }
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const r=new FileReader();
    r.onload=()=>resolve(r.result);
    r.onerror=reject;
    r.readAsDataURL(file);
  });
}

// Comprime a imagem no navegador antes de enviar (resolve SQLITE_TOOBIG do D1).
// Redimensiona para máx 1280px e converte para JPEG 85% — de ~4MB cai para ~200KB.
function compressImage(file){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const MAX=1280;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){
        if(w>h){h=Math.round(h*MAX/w);w=MAX;}
        else{w=Math.round(w*MAX/h);h=MAX;}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#ffffff';ctx.fillRect(0,0,w,h); // fundo branco (JPEG não tem transparência)
      ctx.drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',0.85));
    };
    img.onerror=reject;
    img.src=url;
  });
}

function verFoto(id, which, btn){
  const tabs=document.getElementById('ftabs-'+id);
  const img=document.getElementById('ci-'+id);
  if(!tabs||!img)return;
  const base=which==='orig'?tabs.dataset.orig:tabs.dataset.nova;
  // Cache-buster: força o navegador a buscar a imagem certa, nunca a cacheada
  img.src=base+(base.includes('?')?'&':'?')+'cb='+Date.now();
  img.style.display='block';
  const fb=img.parentElement?.querySelector('.ci-ph-fallback');
  if(fb)fb.style.display='none';
  tabs.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function compararFotos(id){
  const tabs=document.getElementById('ftabs-'+id);
  if(!tabs)return;
  const cb='cb='+Date.now();
  const urlOriginal=(tabs.dataset.big||tabs.dataset.orig)+((tabs.dataset.big||tabs.dataset.orig).includes('?')?'&':'?')+cb;
  const urlNova=tabs.dataset.nova+(tabs.dataset.nova.includes('?')?'&':'?')+cb;
  let modal=document.getElementById('cmp-modal');
  if(modal)modal.remove();
  modal=document.createElement('div');
  modal.id='cmp-modal';
  modal.innerHTML=`
    <div class="cmp-backdrop" onclick="document.getElementById('cmp-modal').remove()"></div>
    <div class="cmp-content">
      <div class="cmp-header">
        <span>⇄ Comparação — Original vs Nova</span>
        <button class="cmp-close" onclick="document.getElementById('cmp-modal').remove()">✕ Fechar</button>
      </div>
      <div class="cmp-grid">
        <div class="cmp-side">
          <div class="cmp-label">📷 Original</div>
          <img src="${urlOriginal}" alt="Original"/>
        </div>
        <div class="cmp-side">
          <div class="cmp-label cmp-label-nova">✨ Nova (gerada)</div>
          <img src="${urlNova}" alt="Nova"/>
        </div>
      </div>
    </div>`;
  document.body.appendChild(modal);
  const esc=(ev)=>{if(ev.key==='Escape'){modal.remove();document.removeEventListener('keydown',esc);}};
  document.addEventListener('keydown',esc);
}

async function processarProximos10(){
  if(busy)return;
  busy=true;
  const btn=document.getElementById('btnP');
  btn.disabled=true;btn.textContent='⏳ Analisando...';
  log('Analisando fotos...');
  try{
    const s=await api('start-batch',{method:'POST'});
    if(s.error==='sem_registros_pendentes'){
      log('✓ Todas as fotos da fila já foram analisadas! Vá para a aba "Em Revisão" para revisá-las.','ok');
      setTab('revisao');
      return;
    }
    if(s.error){log('Erro: '+s.error,'er');return;}
    batchId=s.batch_id;
    log(`Lote #${batchId} ${s.resumed?'(retomado)':'criado'}.`,'ok');
    for(let i=0;i<30;i++){
      const r=await api('process-next',{method:'POST',body:JSON.stringify({batch_id:batchId})});
      if(r.error&&r.error!=='sem_registros_pendentes'){log('Erro item: '+r.error,'er');break;}
      if(r.done){log('Lote pronto.','ok');break;}
      const desc=r.descricao?` — "${r.descricao.slice(0,50)}${r.descricao.length>50?'…':''}"`:r.ai_error?` ⚠ IA: ${r.ai_error.slice(0,60)}`:'  (sem IA — key não detectada)';
      const conf=r.confianca!=null?` [${Math.round(r.confianca*100)}%]`:'';
      log(`Foto ${r.item_id}${desc}${conf}`,r.ai_error?'er':'');
    }
    setTab('revisao');
    await atualizarContagens();
  }catch(err){log('Erro: '+err.message,'er');}
  finally{busy=false;btn.disabled=false;btn.textContent='▶ Processar próximos 15';}
}

      rl.innerHTML=ps.map(p=>`<button class="er-btn${cur&&cur.product_id===p.product_id?' sel':''}"
        onclick="selEd(${id},'${eq(p.product_id)}','${eq(p.title)}')">
        ${e(p.title)}<span style="color:var(--muted);font-size:10px;margin-left:5px">${e(p.product_type||'')}</span>
      </button>`).join('');
    }catch(err){rl.innerHTML='<div class="er-hint">Erro: '+e(err.message)+'</div>';}
  },350);
}

function selEd(id,pid,title){
  ESELS[id]={product_id:pid,title};
  SELS[id]={product_id:pid,title};
  applyChoiceToFields(id,title);
  // Atualiza os campos de descrição e santo na tela imediatamente
  const dEl=document.getElementById('ef-desc-'+id);
  const sEl=document.getElementById('ef-santo-'+id);
  if(dEl)dEl.value=title;
  if(sEl){const s=extrairSanto(title);if(s)sEl.value=s;}
  const ab=document.querySelector(`#card-${id} .aa`);
  if(ab){ab.disabled=false;ab.textContent='✓ Vincular e Aprovar';}
  log(`Selecionado: "${title}" — descrição e santo atualizados`,'ok');
  const rl=document.getElementById('erl-'+id);
  if(rl)rl.querySelectorAll('.er-btn').forEach(b=>b.classList.toggle('sel',b.textContent.trim().startsWith(title.slice(0,8))));
}

async function salvarCorrecao(id){
  const g=s=>{const el=document.getElementById(s);return el?el.value.trim():null;};
  const desc=g(`ef-desc-${id}`)||null;
  const santo=g(`ef-santo-${id}`)||null;
  const cat=g(`ef-cat-${id}`)||null;
  const mat=g(`ef-mat-${id}`)||null;
  const altRaw=g(`ef-alt-${id}`);
  const precoRaw=g(`ef-preco-${id}`);
  const alt=altRaw&&altRaw!==''?Number(altRaw):null;
  const preco=precoRaw&&precoRaw!==''?Number(precoRaw):null;
  const fields={};
  if(desc!==null)fields.produto_identificado=desc;
  if(santo!==null)fields.santo_devocao=santo;
  if(cat!==null)fields.categoria=cat;
  if(mat!==null)fields.material=mat;
  if(alt!==null)fields.altura_valor=alt;
  if(preco!==null)fields.preco_valor=preco;
  if(!Object.keys(fields).length){log('Nenhum campo alterado.','er');return;}
  try{
    const r=await api('review-action',{method:'POST',body:JSON.stringify({item_id:id,action:'CORRIGIR',fields})});
    if(r.error){log('Erro: '+r.error,'er');return;}
    log(`Item ${id}: correção salva.`,'ok');
    EOPEN[id]=false;
    delete PENDING_FIELDS[id];
    await refreshCard(id);
  }catch(err){log('Erro: '+err.message,'er');}
}

function selCand(id,pid,title){
  const prev=SELS[id];
  if(prev&&prev.product_id===pid){
    delete SELS[id];delete ESELS[id];
    refreshCard(id);
    return;
  }
  SELS[id]={product_id:pid,title};
  ESELS[id]={product_id:pid,title};
  // Ao escolher um candidato, abre a edição já preenchida com os dados do produto escolhido
  // e sobrescreve a descrição/santo com base na escolha do usuário (não no palpite da IA)
  EOPEN[id]=true;
  applyChoiceToFields(id,title);
  refreshCard(id);
}

// Deduz santo a partir do título do produto e preenche os campos de correção
function applyChoiceToFields(id,title){
  const santo=extrairSanto(title);
  PENDING_FIELDS[id]={
    produto_identificado:title,
    santo_devocao:santo||'',
  };
}

// Lista de santos/devoções conhecidos para extrair do título do produto
const SANTOS_CONHECIDOS=[
  'Nossa Senhora Aparecida','Nossa Senhora de Fátima','Nossa Senhora das Graças','Nossa Senhora do Carmo',
  'Nossa Senhora de Lourdes','Nossa Senhora Desatadora dos Nós','Nossa Senhora Rainha','Nossa Senhora da Penha',
  'Nossa Senhora do Perpétuo Socorro','Imaculada Conceição','Imaculado Coração de Maria',
  'Sagrado Coração de Jesus','Divino Espírito Santo','Menino Jesus de Praga','Jesus Misericordioso',
  'São Bento','São Francisco de Assis','São Francisco','Santo Antônio','São José','São Jorge','São Judas Tadeu',
  'São Miguel Arcanjo','São Miguel','São Cristóvão','São João Batista','São Sebastião','São Roque',
  'Santa Rita','Santa Teresinha','Santa Luzia','Santa Terezinha','Padre Pio','Anjo da Guarda',
  'Nossa Senhora','Santo','Santa','São',
];
function extrairSanto(title){
  const t=title||'';
  for(const s of SANTOS_CONHECIDOS){
    if(t.toLowerCase().includes(s.toLowerCase()))return s;
  }
  return '';
}

async function refreshCard(id){
  // Busca o item individualmente — funciona em qualquer aba (não só no lote atual)
  let it=null;
  try{
    const r=await api('records?status=__byid__&item_id='+id);
    if(r.item)it=r.item;
  }catch{}
  // Fallback: tenta pelo lote atual
  if(!it&&batchId){
    try{
      const r=await api('batch-status?batch_id='+batchId);
      if(!r.error)it=r.items.find(i=>i.id===id);
    }catch{}
  }
  if(!it)return;
  const el=document.getElementById('card-'+id);
  if(!el)return;
  const isRes=['APROVADO','REPROVADO','PRECISA_DE_AJUSTE','PRECISA_DE_NOVA_FOTO'].includes(it.status);
  const tmp=document.createElement('div');
  tmp.innerHTML=card(it,isRes);
  el.replaceWith(tmp.firstElementChild);
  if(EOPEN[id]){const inp=document.getElementById('esi-'+id);if(inp)inp.focus();}
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function aprovar(id){
  const sel=SELS[id];
  const body={item_id:id,action:'APROVAR'};
  const fields={};
  if(sel){
    fields.shopify_product_id=sel.product_id;
    fields.confianca_correspondencia=1.0;
    fields.status_correspondencia='VINCULADO_MANUALMENTE';
  }
  // Se o painel de edição está aberto, grava os valores dos campos (escolha do usuário)
  const g=s=>{const el=document.getElementById(s);return el?el.value.trim():null;};
  const desc=g(`ef-desc-${id}`);
  const santo=g(`ef-santo-${id}`);
  const cat=g(`ef-cat-${id}`);
  const mat=g(`ef-mat-${id}`);
  const altRaw=g(`ef-alt-${id}`);
  const precoRaw=g(`ef-preco-${id}`);
  if(desc)fields.produto_identificado=desc;
  else if(sel)fields.produto_identificado=sel.title; // fallback: usa título do produto escolhido
  if(santo)fields.santo_devocao=santo;
  if(cat)fields.categoria=cat;
  if(mat)fields.material=mat;
  if(altRaw&&altRaw!=='')fields.altura_valor=Number(altRaw);
  if(precoRaw&&precoRaw!=='')fields.preco_valor=Number(precoRaw);
  // Se escolheu produto mas não editou descrição, usa o título do produto (nunca o palpite errado da IA)
  if(sel&&!desc)fields.produto_identificado=sel.title;
  if(Object.keys(fields).length)body.fields=fields;
  await exec(id,body);
  delete SELS[id];delete ESELS[id];delete EOPEN[id];delete PENDING_FIELDS[id];
}
async function acao(id,action){await exec(id,{item_id:id,action});}
async function exec(id,body){
  try{
    const r=await api('review-action',{method:'POST',body:JSON.stringify(body)});
    if(r.error==='aprovacao_bloqueada'){log('Bloqueado: '+r.reason,'er');alert('Não pode aprovar: '+r.reason);return;}
    if(r.error){log('Erro: '+r.error,'er');return;}
    log(`Item ${id}: ${r.status}`,r.status==='APROVADO'?'ok':'');
    // Ações que mudam o item de aba: remove o card da tela com animação
    const MOVE_ACTIONS=['REPROVAR','APROVAR','SOLICITAR_NOVA_FOTO'];
    if(MOVE_ACTIONS.includes(body.action)){
      removerCard(id);
    } else {
      await refreshCard(id);
    }
    await atualizarContagens();
  }catch(err){log('Erro: '+err.message,'er');}
}

// Remove o card da tela com fade — item foi para outra aba
function removerCard(id){
  const el=document.getElementById('card-'+id);
  if(!el)return;
  el.classList.add('card-saindo');
  setTimeout(()=>{
    el.remove();
    // Atualiza o contador da seção "Aguardando revisão" se existir
    const ss=document.querySelector('.sh .ss');
    const grid=document.querySelector('.grid');
    if(ss&&grid)ss.textContent=`${grid.children.length} foto(s)`;
  },350);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function eq(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');}
