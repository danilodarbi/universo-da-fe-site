<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<title>Auditoria de Fotos — Universo da Fé</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a2744;
  --gold: #c9a84c;
  --gold-dim: #7a6128;
  --bg: #0d0f14;
  --surface: #161923;
  --surface2: #1e2330;
  --border: #252b3b;
  --text: #d8dde8;
  --muted: #6b7591;
  --ok: #1f6b3a;
  --ok-fg: #4ade80;
  --warn: #7a5c00;
  --warn-fg: #fbbf24;
  --err: #7a1e1e;
  --err-fg: #f87171;
  --selected: #1a3a5c;
  --selected-border: #3b82f6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

/* ── Login ── */
#login {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
}
.login-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 48px 40px; width: 360px; text-align: center;
}
.login-box .cross { font-size: 32px; margin-bottom: 20px; }
.login-box h1 { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--gold); margin-bottom: 6px; font-weight: 600; }
.login-box p { color: var(--muted); margin-bottom: 28px; font-size: 12px; }
.login-box input {
  width: 100%; padding: 12px 14px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 8px; color: var(--text);
  font-size: 14px; font-family: 'IBM Plex Mono', monospace; margin-bottom: 12px;
  outline: none; transition: border-color .2s;
}
.login-box input:focus { border-color: var(--gold); }
.btn-login {
  width: 100%; padding: 12px; background: var(--gold); color: #0d0f14;
  border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
  cursor: pointer; letter-spacing: 0.03em; transition: opacity .2s;
}
.btn-login:hover { opacity: 0.85; }

/* ── Header ── */
#app { display: none; }
header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
  height: 56px; position: sticky; top: 0; z-index: 100;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-brand .cross { color: var(--gold); font-size: 18px; }
.header-brand h1 { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--gold); font-weight: 600; }
.header-stats { display: flex; gap: 20px; font-size: 11px; font-family: 'IBM Plex Mono', monospace; }
.stat { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.stat-val { color: var(--text); font-size: 14px; font-weight: 500; }
.stat-lbl { color: var(--muted); }
.header-link { color: var(--muted); font-size: 12px; text-decoration: none; }
.header-link:hover { color: var(--text); }

/* ── Controls ── */
.controls {
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  background: var(--surface);
}
.btn {
  padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
  font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
  display: inline-flex; align-items: center; gap: 6px;
  transition: opacity .15s, transform .1s;
}
.btn:hover { opacity: 0.85; }
.btn:active { transform: scale(.97); }
.btn-gold { background: var(--gold); color: #0d0f14; }
.btn-dim { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-dim:hover { border-color: var(--gold-dim); }
.controls-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
.badge-count {
  background: var(--navy); color: var(--gold); border-radius: 10px;
  padding: 1px 7px; font-size: 10px; font-family: 'IBM Plex Mono', monospace;
}

/* ── Progress bar ── */
.progress-wrap { height: 3px; background: var(--surface2); }
.progress-bar { height: 100%; background: var(--gold); transition: width .4s; width: 0%; }

/* ── Log ── */
#log-wrap {
  padding: 10px 24px; font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border);
  min-height: 32px; max-height: 80px; overflow-y: auto; background: var(--bg);
}
#log-wrap .log-line { line-height: 1.6; }
#log-wrap .log-line.err { color: var(--err-fg); }
#log-wrap .log-line.ok { color: var(--ok-fg); }

/* ── Main layout ── */
main { padding: 24px; max-width: 1400px; margin: 0 auto; }

/* ── Empty / Loading ── */
.empty-state {
  text-align: center; padding: 80px 20px; color: var(--muted);
}
.empty-state h2 { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--text); margin-bottom: 12px; font-weight: 400; }
.empty-state p { max-width: 380px; margin: 0 auto 24px; line-height: 1.6; }
.spinner {
  width: 28px; height: 28px; border: 2px solid var(--border);
  border-top-color: var(--gold); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Grid ── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--gold); font-weight: 400; }
.section-sub { color: var(--muted); font-size: 11px; margin-top: 2px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

/* ── Card ── */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden; display: flex; flex-direction: column;
  transition: border-color .2s;
}
.card:hover { border-color: var(--gold-dim); }
.card.resolved { opacity: .5; pointer-events: none; }

.card-img {
  width: 100%; height: 200px; object-fit: contain;
  background: #0a0b0f; display: block;
}
.card-img-placeholder {
  width: 100%; height: 200px; background: #0a0b0f;
  display: flex; align-items: center; justify-content: center;
  color: var(--muted); font-size: 11px; font-family: 'IBM Plex Mono', monospace;
}

.card-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 12px; }

.card-meta { display: flex; align-items: center; justify-content: space-between; }
.card-filename {
  font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--muted);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px;
}
.card-status-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.06em;
  padding: 3px 8px; border-radius: 10px; white-space: nowrap;
}
.st-PENDENTE, .st-ANALISANDO { background: var(--surface2); color: var(--muted); }
.st-PRONTO_PARA_REVISAO { background: var(--ok); color: var(--ok-fg); }
.st-APROVADO { background: #14432a; color: #4ade80; }
.st-REPROVADO { background: #2a1414; color: #f87171; }
.st-PRECISA_DE_NOVA_FOTO { background: var(--warn); color: var(--warn-fg); }
.st-ERRO { background: var(--err); color: var(--err-fg); }
.st-PRECISA_DE_AJUSTE { background: #2a2000; color: var(--warn-fg); }

/* Candidates */
.candidates-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.candidates-list { display: flex; flex-direction: column; gap: 6px; margin-top: 6px; }
.candidate-btn {
  width: 100%; text-align: left; padding: 9px 12px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; color: var(--text); cursor: pointer;
  display: flex; align-items: center; justify-content: space-between;
  gap: 8px; transition: border-color .15s, background .15s;
  font-size: 12px; font-family: 'Inter', sans-serif;
}
.candidate-btn:hover { border-color: var(--gold-dim); background: #1c2233; }
.candidate-btn.selected { border-color: var(--selected-border); background: var(--selected); }
.candidate-score {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  color: var(--muted); white-space: nowrap; flex-shrink: 0;
}
.no-candidates { font-size: 11px; color: var(--muted); font-style: italic; padding: 8px 0; }

/* Linked product display */
.linked-product {
  padding: 10px 12px; background: #14261a;
  border: 1px solid #2e5c3a; border-radius: 7px;
  font-size: 12px; color: var(--ok-fg);
}
.linked-product .linked-label { font-size: 10px; font-weight: 600; color: #4ade8088; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }

/* Error display */
.error-msg { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--err-fg); padding: 8px; background: var(--err); border-radius: 6px; word-break: break-word; }

/* Card actions */
.card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.act-approve {
  padding: 8px 14px; background: var(--ok); color: var(--ok-fg);
  border: none; border-radius: 6px; cursor: pointer; font-size: 12px;
  font-weight: 600; flex: 1; transition: opacity .15s;
}
.act-approve:disabled { opacity: .35; cursor: not-allowed; }
.act-approve:not(:disabled):hover { opacity: .85; }
.act-skip {
  padding: 8px 12px; background: var(--surface2); color: var(--muted);
  border: 1px solid var(--border); border-radius: 6px; cursor: pointer;
  font-size: 12px; font-weight: 600; transition: opacity .15s;
}
.act-skip:hover { color: var(--text); border-color: var(--muted); }
.act-reject {
  padding: 8px 12px; background: var(--err); color: var(--err-fg);
  border: none; border-radius: 6px; cursor: pointer; font-size: 12px;
  font-weight: 600; transition: opacity .15s;
}
.act-reject:hover { opacity: .85; }
.act-nova-foto {
  padding: 8px 12px; background: var(--warn); color: var(--warn-fg);
  border: none; border-radius: 6px; cursor: pointer; font-size: 12px;
  font-weight: 600; transition: opacity .15s;
}
.act-nova-foto:hover { opacity: .85; }

/* Resolved overlay label */
.resolved-label { text-align: center; padding: 6px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; }

/* Scrollable thumbnail expansion */
.card-img:hover { cursor: zoom-in; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="cross">✝</div>
    <h1>Universo da Fé</h1>
    <p>Sistema de Auditoria de Fotos</p>
    <input id="pwd" type="password" placeholder="Senha admin" autocomplete="current-password" />
    <button class="btn-login" onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="header-brand">
      <span class="cross">✝</span>
      <h1>Auditoria de Fotos</h1>
    </div>
    <div class="header-stats" id="hStats"></div>
    <a href="/admin/" class="header-link">← Painel</a>
  </header>

  <div class="controls">
    <button class="btn btn-gold" onclick="processarProximos10()" id="btnProcessar">
      ▶ Processar próximos 10
    </button>
    <div class="controls-sep"></div>
    <button class="btn btn-dim" onclick="syncDrive()">🔄 Sincronizar Drive</button>
    <button class="btn btn-dim" onclick="syncShopify()">🔄 Sincronizar Shopify</button>
    <div class="controls-sep"></div>
    <button class="btn btn-dim" onclick="carregarLoteAtual()">↻ Continuar lote</button>
    <button class="btn btn-dim" onclick="carregarTodosRevisao()">📋 Ver todos pendentes</button>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar"></div>
  </div>
  <div id="log-wrap"></div>

  <main>
    <div id="mainContent">
      <div class="empty-state">
        <h2>Pronto para auditar</h2>
        <p>Clique em <strong>Sincronizar Drive</strong> e depois em <strong>Sincronizar Shopify</strong> para preparar o banco, então clique em <strong>Processar próximos 10</strong>.</p>
      </div>
    </div>
  </main>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let PWD = '';
let currentBatchId = null;
let processing = false;
// Maps item_id → { product_id, title } for pending candidate selection
const selections = {};

// ── Auth ─────────────────────────────────────────────────────────────────────
function login() {
  PWD = document.getElementById('pwd').value.trim();
  if (!PWD) return;
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  carregarLoteAtual();
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login').style.display !== 'none') login();
});

// ── API helper ────────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch('/api/audit/' + path, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'X-Admin-Password': PWD,
      ...(opts.headers || {}),
    },
  });
  if (res.status === 401) { alert('Senha incorreta'); location.reload(); throw new Error('unauthorized'); }
  return res.json();
}

// ── Logging ───────────────────────────────────────────────────────────────────
function log(msg, type = '') {
  const wrap = document.getElementById('log-wrap');
  const line = document.createElement('div');
  line.className = 'log-line' + (type ? ' ' + type : '');
  const ts = new Date().toTimeString().slice(0, 8);
  line.textContent = `[${ts}] ${msg}`;
  wrap.prepend(line);
  // Keep only last 20 lines
  while (wrap.children.length > 20) wrap.removeChild(wrap.lastChild);
}

// ── Sync actions ──────────────────────────────────────────────────────────────
async function syncDrive() {
  log('Sincronizando pastas do Drive...');
  try {
    const r = await api('sync-drive', { method: 'POST' });
    if (r.errors?.length) log(`Drive: ${r.inserted} novos, ${r.updated} atualizados — erros: ${r.errors.join('; ')}`, 'err');
    else log(`Drive sincronizado: ${r.inserted} novos, ${r.updated} atualizados.`, 'ok');
  } catch(e) { log('Erro sync Drive: ' + e.message, 'err'); }
}

async function syncShopify() {
  log('Sincronizando catálogo Shopify...');
  try {
    const r = await api('sync-shopify-cache', { method: 'POST' });
    if (r.error) log('Erro Shopify: ' + r.error, 'err');
    else log(`Shopify sincronizado: ${r.synced} produtos.`, 'ok');
  } catch(e) { log('Erro sync Shopify: ' + e.message, 'err'); }
}

// ── Process batch ─────────────────────────────────────────────────────────────
async function processarProximos10() {
  if (processing) return;
  processing = true;
  document.getElementById('btnProcessar').disabled = true;
  log('Criando lote...');
  try {
    const start = await api('start-batch', { method: 'POST' });
    if (start.error) { log('Erro: ' + start.error, 'err'); return; }
    currentBatchId = start.batch_id;
    log(`Lote #${currentBatchId} ${start.resumed ? '(retomado)' : 'criado'} — ${start.total || '?'} itens.`, 'ok');

    let safety = 0;
    while (safety++ < 30) {
      const r = await api('process-next', { method: 'POST', body: JSON.stringify({ batch_id: currentBatchId }) });
      if (r.error) { log('Erro item: ' + r.error, 'err'); break; }
      if (r.done) { log('Lote preparado. Revise as fotos abaixo.', 'ok'); break; }
      log(`Foto ${r.item_id}: ${r.candidates} candidato(s) identificado(s)`);
      await renderBatch();
    }
    await renderBatch();
  } catch(e) {
    log('Erro processar: ' + e.message, 'err');
  } finally {
    processing = false;
    document.getElementById('btnProcessar').disabled = false;
  }
}

// ── Load / Render ─────────────────────────────────────────────────────────────
async function carregarLoteAtual() {
  try {
    const r = await api('batch-status');
    if (r.error) return; // nenhum lote ativo — tudo bem
    currentBatchId = r.batch.id;
    await renderBatch();
  } catch {}
}

async function carregarTodosRevisao() {
  // Mostra todos os itens PRONTO_PARA_REVISAO do lote atual
  await renderBatch();
}

async function renderBatch() {
  if (!currentBatchId) return;
  const r = await api('batch-status?batch_id=' + currentBatchId);
  if (r.error) return;
  const { batch, items } = r;

  // Header stats
  const pct = batch.total_items ? Math.round(batch.processed_items / batch.total_items * 100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  renderStats(batch);

  const main = document.getElementById('mainContent');
  if (!items || items.length === 0) {
    main.innerHTML = '<div class="empty-state"><h2>Nenhum item neste lote</h2></div>';
    return;
  }

  // Separate: pending review vs resolved
  const pendentes = items.filter(it => ['PRONTO_PARA_REVISAO', 'ERRO', 'ANALISANDO', 'PENDENTE'].includes(it.status));
  const resolvidos = items.filter(it => ['APROVADO', 'REPROVADO', 'PRECISA_DE_AJUSTE', 'PRECISA_DE_NOVA_FOTO'].includes(it.status));

  let html = '';

  if (pendentes.length) {
    html += `<div class="section-header">
      <div>
        <div class="section-title">Aguardando revisão</div>
        <div class="section-sub">${pendentes.length} foto(s) — selecione o produto correspondente e aprove</div>
      </div>
    </div>
    <div class="grid" id="grid-pendentes">
      ${pendentes.map(it => cardHtml(it)).join('')}
    </div>`;
  }

  if (resolvidos.length) {
    html += `<div class="section-header" style="margin-top:32px">
      <div>
        <div class="section-title">Resolvidos neste lote</div>
        <div class="section-sub">${resolvidos.length} foto(s)</div>
      </div>
    </div>
    <div class="grid">
      ${resolvidos.map(it => cardHtml(it, true)).join('')}
    </div>`;
  }

  main.innerHTML = html || '<div class="empty-state"><h2>Lote concluído</h2><p>Todos os itens foram revisados.</p></div>';
}

function renderStats(batch) {
  const el = document.getElementById('hStats');
  const todo = batch.total_items - batch.processed_items;
  el.innerHTML = `
    <div class="stat"><span class="stat-val">${batch.total_items}</span><span class="stat-lbl">Total</span></div>
    <div class="stat"><span class="stat-val" style="color:var(--ok-fg)">${batch.processed_items}</span><span class="stat-lbl">Prontos</span></div>
    <div class="stat"><span class="stat-val" style="color:var(--warn-fg)">${todo}</span><span class="stat-lbl">Pendentes</span></div>
    <div class="stat"><span class="stat-val" style="color:var(--err-fg)">${batch.error_items}</span><span class="stat-lbl">Erros</span></div>
  `;
}

// ── Card HTML ─────────────────────────────────────────────────────────────────
function cardHtml(it, resolved = false) {
  const thumb = it.thumbnail_link ? it.thumbnail_link.replace(/=s\d+$/, '=s500') : '';
  const imgHtml = thumb
    ? `<img class="card-img" src="${esc(thumb)}" onerror="this.style.opacity=0.15" loading="lazy" />`
    : `<div class="card-img-placeholder">sem thumbnail</div>`;

  // Parse candidates from ai_result_json
  let candidates = [];
  try { candidates = JSON.parse(it.ai_result_json || '[]'); } catch {}
  // Also try if it's wrapped
  if (!Array.isArray(candidates)) candidates = [];

  const sel = selections[it.id];
  const linkedId = it.shopify_product_id;

  let candidatesHtml = '';
  if (resolved && linkedId) {
    // Show linked product
    candidatesHtml = `<div class="linked-product">
      <div class="linked-label">Produto vinculado</div>
      ${esc(it.produto_identificado || linkedId)}
    </div>`;
  } else if (candidates.length > 0) {
    const btns = candidates.map(c => {
      const isSelected = sel && sel.product_id === c.product_id;
      const scoreLabel = c.score > 0 ? `${Math.round(c.score * 100)}%` : '—';
      return `<button class="candidate-btn ${isSelected ? 'selected' : ''}"
        onclick="selectCandidate(${it.id}, '${escQ(c.product_id)}', '${escQ(c.title)}')"
        title="${esc(c.product_id)}">
        <span>${esc(c.title)}</span>
        <span class="candidate-score">${scoreLabel}</span>
      </button>`;
    }).join('');
    candidatesHtml = `<div>
      <div class="candidates-label">Candidatos Shopify</div>
      <div class="candidates-list">${btns}</div>
    </div>`;
  } else {
    candidatesHtml = `<div>
      <div class="candidates-label">Candidatos Shopify</div>
      <div class="no-candidates">Nenhum candidato por nome — vincule manualmente abaixo</div>
    </div>`;
  }

  // Error display
  const errHtml = it.ai_error ? `<div class="error-msg">${esc(it.ai_error)}</div>` : '';

  // Actions
  let actionsHtml = '';
  if (!resolved) {
    const canApprove = !!(sel || linkedId);
    actionsHtml = `<div class="card-actions">
      <button class="act-approve" ${canApprove ? '' : 'disabled'}
        onclick="aprovarComSelecionado(${it.id})" id="btn-approve-${it.id}">
        ${sel ? '✓ Vincular e Aprovar' : '✓ Aprovar'}
      </button>
      <button class="act-skip" onclick="acao(${it.id},'PULAR')">Pular</button>
      <button class="act-nova-foto" onclick="acao(${it.id},'SOLICITAR_NOVA_FOTO')">Nova foto</button>
      <button class="act-reject" onclick="acao(${it.id},'REPROVAR')">Reprovar</button>
    </div>`;
  } else {
    const stLabel = {
      APROVADO: '✓ Aprovado',
      REPROVADO: '✗ Reprovado',
      PRECISA_DE_NOVA_FOTO: '↻ Nova foto solicitada',
      PRECISA_DE_AJUSTE: '✎ Precisa de ajuste',
    }[it.status] || it.status;
    actionsHtml = `<div class="resolved-label" style="color:var(--muted)">${stLabel}</div>`;
  }

  return `<div class="card ${resolved ? 'resolved' : ''}" id="card-${it.id}">
    ${imgHtml}
    <div class="card-body">
      <div class="card-meta">
        <span class="card-filename" title="${esc(it.file_name)}">${esc(it.file_name)}</span>
        <span class="card-status-badge st-${it.status}">${it.status.replace(/_/g,' ')}</span>
      </div>
      ${errHtml}
      ${candidatesHtml}
      ${actionsHtml}
    </div>
  </div>`;
}

// ── Candidate selection ───────────────────────────────────────────────────────
function selectCandidate(itemId, productId, title) {
  // Toggle: clicking selected again deselects
  const prev = selections[itemId];
  if (prev && prev.product_id === productId) {
    delete selections[itemId];
  } else {
    selections[itemId] = { product_id: productId, title };
  }
  // Re-render just this card to reflect selection
  refreshCard(itemId);
}

async function refreshCard(itemId) {
  if (!currentBatchId) return;
  const r = await api('batch-status?batch_id=' + currentBatchId);
  if (r.error) return;
  const item = r.items.find(i => i.id === itemId);
  if (!item) return;
  const card = document.getElementById('card-' + itemId);
  if (!card) return;
  const resolved = ['APROVADO','REPROVADO','PRECISA_DE_AJUSTE','PRECISA_DE_NOVA_FOTO'].includes(item.status);
  card.outerHTML = cardHtml(item, resolved);
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function aprovarComSelecionado(itemId) {
  const sel = selections[itemId];
  const body = { item_id: itemId, action: 'APROVAR' };
  if (sel) {
    body.fields = {
      shopify_product_id: sel.product_id,
      produto_identificado: sel.title,
      confianca_correspondencia: 1.0,
      status_correspondencia: 'VINCULADO_MANUALMENTE',
    };
  }
  await executarAcao(itemId, body);
  delete selections[itemId];
}

async function acao(itemId, action) {
  await executarAcao(itemId, { item_id: itemId, action });
}

async function executarAcao(itemId, body) {
  try {
    const r = await api('review-action', { method: 'POST', body: JSON.stringify(body) });
    if (r.error === 'aprovacao_bloqueada') {
      log(`Bloqueado: ${r.reason}`, 'err');
      alert('Não pode aprovar: ' + r.reason);
      return;
    }
    if (r.error) { log('Erro: ' + r.error, 'err'); return; }
    log(`Item ${itemId}: ${r.status}`, r.status === 'APROVADO' ? 'ok' : '');
    // Refresh entire batch render to move card to resolved section
    await renderBatch();
  } catch(e) {
    log('Erro ação: ' + e.message, 'err');
  }
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escQ(s) {
  return String(s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');
}
</script>
